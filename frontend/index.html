<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeIgniter 4 Visualizer</title>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: #f8f8f8; }
        #app-header { background-color: #343a40; color: white; padding: 15px 20px; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        #app-header h1 { margin: 0; font-size: 1.8em; text-align: center; }
        #main-content { display: flex; flex-grow: 1; overflow: hidden; }
        #controls-panel { width: 300px; padding: 20px; border-right: 1px solid #ddd; background-color: #fff; box-shadow: 2px 0 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; z-index: 10; }
        #controls-panel label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        #controls-panel input[type="text"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 15px; border: 1px solid #ced4da; border-radius: 4px; font-size: 0.9em; }
        #controls-panel button { width: 100%; padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; transition: background-color 0.2s ease; }
        #controls-panel button:hover { background-color: #0056b3; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-size: 0.9em; overflow-wrap: break-word; }
        #message.success { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        #message.error { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        #message.info { background-color: #d1ecf1; color: #0c5460; border-color: #bee5eb; }
        #graph-container { flex-grow: 1; background-color: #ffffff; position: relative; }
        #cy { width: 100%; height: 100%; display: block; }

        /* Legend */
        #legend { margin-top: auto; padding-top: 20px; font-size: 0.8em; border-top: 1px solid #eee; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .legend-color { width: 15px; height: 15px; margin-right: 10px; border-radius: 3px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="app-header">
        <h1>CodeIgniter 4 Project Visualizer</h1>
    </div>
    <div id="main-content">
        <div id="controls-panel">
            <label for="projectPath">CodeIgniter 4 Project Path:</label>
            <input type="text" id="projectPath" placeholder="e.g., C:\xampp\htdocs\my_ci4_project">
            <button id="generateButton">Generate Diagram</button>
            <div id="message"></div>

            <div id="legend">
                <strong>Legend:</strong>
                <div class="legend-item"><div class="legend-color" style="background-color: #343a40;"></div> Project</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #f0f8ff;"></div> File</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #d4edda;"></div> Controller</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #ffeeba;"></div> Model / Instance</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #f8d7da;"></div> View</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #d1ecf1;"></div> Route</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #dc3545;"></div> Error</div>
            </div>
        </div>
        <div id="graph-container">
            <div id="cy"></div>
        </div>
    </div>

    <script>
        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [],
            style: [
                {
                    selector: 'node',
                    style: {
                        'content': 'data(label)',
                        'text-valign': 'center',
                        'text-halign': 'center',
                        'background-color': '#999',
                        'padding': '10px',
                        'shape': 'roundrectangle',
                        'width': 'label',
                        'height': 'label',
                        'color': 'black',
                        'font-size': '10px',
                        'border-width': 1,
                        'border-color': '#ccc',
                        'text-wrap': 'wrap',
                        'text-max-width': '120px'
                    }
                },
                {
                    selector: ':parent', // Compound nodes
                    style: {
                        'background-opacity': 0.1,
                        'border-color': '#888',
                        'border-width': 2,
                        'border-style': 'dashed',
                        'text-valign': 'top',
                        'text-halign': 'center',
                        'padding': '20px'
                    }
                },
                { selector: 'node[type="project"]', style: { 'background-color': '#343a40', 'color': 'white', 'font-size': '14px', 'font-weight': 'bold' } },
                { selector: 'node[type="file"]', style: { 'background-color': '#f0f8ff', 'border-color': '#aaddff' } },
                { selector: 'node[type="controller"]', style: { 'background-color': '#d4edda', 'border-color': '#28a745', 'color': '#155724' } },
                { selector: 'node[type="model"]', style: { 'background-color': '#ffeeba', 'border-color': '#ffc107', 'color': '#856404' } },
                { selector: 'node[type="route"]', style: { 'background-color': '#d1ecf1', 'border-color': '#17a2b8', 'shape': 'octagon' } },
                { selector: 'node[type="method"]', style: { 'background-color': '#e2e6ea', 'border-color': '#6c757d', 'shape': 'ellipse' } },
                { selector: 'node[type="view"]', style: { 'background-color': '#f8d7da', 'border-color': '#dc3545', 'color': '#721c24', 'shape': 'rectangle' } },
                { selector: 'node[type="base_class"]', style: { 'background-color': '#e9ecef', 'border-color': '#adb5bd', 'shape': 'diamond' } },
                { selector: 'node[type="model_instance"]', style: { 'background-color': '#ffeeba', 'border-color': '#ffc107', 'shape': 'pentagon' } },
                { selector: 'node[type="error"]', style: { 'background-color': '#dc3545', 'color': 'white', 'shape': 'star' } },
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': '#ccc',
                        'target-arrow-color': '#ccc',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier',
                        'label': 'data(label)',
                        'font-size': '8px',
                        'text-background-opacity': 1,
                        'text-background-color': '#fff',
                        'text-background-padding': '3px',
                        'color': '#555'
                    }
                },
                { selector: 'edge[label="extends"]', style: { 'line-color': '#007bff', 'target-arrow-color': '#007bff' } },
                { selector: 'edge[label="renders"]', style: { 'line-color': '#dc3545', 'target-arrow-color': '#dc3545' } },
                { selector: 'edge[label="uses"]', style: { 'line-color': '#ffc107', 'target-arrow-color': '#ffc107' } },
                { selector: 'edge[label="defines_route"]', style: { 'line-color': '#17a2b8', 'target-arrow-color': '#17a2b8' } },
                { selector: 'edge[label="calls"]', style: { 'line-color': '#28a745', 'target-arrow-color': '#28a745' } }
            ],
            layout: { name: 'cose', animate: true, padding: 10 }
        });

        const showMessage = (text, type = 'info') => {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.innerText = text;
            messageDiv.style.display = 'block';
        };

        const fetchGraphData = async () => {
            const response = await fetch('/api/graph');
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        };

        document.getElementById('generateButton').addEventListener('click', async () => {
            const projectPath = document.getElementById('projectPath').value;
            if (!projectPath) {
                showMessage('Please enter a project path.', 'error');
                return;
            }

            try {
                cy.elements().remove();
                showMessage('Analyzing project... This may take a while.', 'info');

                const analyzeResponse = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: projectPath })
                });

                if (!analyzeResponse.ok) {
                    const errorData = await analyzeResponse.json();
                    throw new Error(errorData.error || `HTTP error! status: ${analyzeResponse.status}`);
                }

                // Polling for data
                let attempts = 0;
                const maxAttempts = 60; // 60 seconds max
                
                const poll = setInterval(async () => {
                    attempts++;
                    try {
                        const graphData = await fetchGraphData();
                        
                        // If we have nodes beyond just the project/error, or if it's been a while
                        if (graphData.nodes && graphData.nodes.length > 2) {
                            clearInterval(poll);
                            renderGraph(graphData);
                        } else if (attempts >= maxAttempts) {
                            clearInterval(poll);
                            if (graphData.nodes && graphData.nodes.length > 0) {
                                renderGraph(graphData);
                            } else {
                                showMessage('Timeout: Analysis is taking too long or returned no data.', 'error');
                            }
                        }
                    } catch (e) {
                        clearInterval(poll);
                        showMessage(`Error polling: ${e.message}`, 'error');
                    }
                }, 2000); // Check every 2 seconds

            } catch (error) {
                console.error('Error:', error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        });

        function renderGraph(graphData) {
            console.log('Rendering Graph Data:', graphData);
            
            const elements = [];
            graphData.nodes.forEach(node => {
                elements.push({ 
                    data: { 
                        id: node.id, 
                        label: node.label, 
                        type: node.type,
                        parent: node.parent // Hierarchical support
                    } 
                });
            });
            graphData.edges.forEach(edge => {
                elements.push({ 
                    data: { 
                        id: edge.id, 
                        source: edge.source, 
                        target: edge.target, 
                        label: edge.label 
                    } 
                });
            });
            
            cy.add(elements);
            cy.layout({
                name: 'cose',
                animate: true,
                animationDuration: 1000,
                refresh: 20,
                padding: 30,
                randomize: true,
                componentSpacing: 100,
                nodeRepulsion: 400000,
                edgeElasticity: 100,
                nestingFactor: 5
            }).run();

            showMessage('Graph generated successfully!', 'success');
        }
    </script>
</body>
</html>
