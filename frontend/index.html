<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code AST Visualizer</title>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <style>
        :root {
            --bg-color: #1a1c22;
            --panel-bg: #21252b;
            --text-color: #abb2bf;
            --header-color: #ffffff;
            --border-color: #3e4451;
            --accent-color: #61afef;
            --node-bg: #2c313a;
            --node-label: #dcdfe4;
            
            --color-folder: #d19a66;
            --color-category: #e5c07b;
            --color-controller: #61afef;
            --color-model: #c678dd;
            --color-view: #98c379;
            --color-route: #56b6c2;
            --color-method: #abb2bf;
            --color-error: #e06c75;
            --color-class: #e5c07b;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); color: var(--text-color); }
        #app-header { background-color: var(--panel-bg); color: var(--header-color); padding: 10px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; z-index: 20; border-bottom: 1px solid var(--border-color); }
        #app-header h1 { margin: 0; font-size: 1.1em; letter-spacing: 1px; }
        #app-header .status-bar { font-size: 0.75em; color: #5c6370; }
        
        #main-content { display: flex; flex-grow: 1; overflow: hidden; }
        #controls-panel { width: 240px; padding: 20px; border-right: 1px solid var(--border-color); background-color: var(--panel-bg); display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        #controls-panel .control-group { margin-bottom: 20px; }
        #controls-panel label { display: block; margin-bottom: 8px; font-size: 0.75em; font-weight: bold; color: #5c6370; text-transform: uppercase; }
        #controls-panel input[type="text"] { width: calc(100% - 22px); padding: 8px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; font-size: 0.85em; color: var(--text-color); margin-bottom: 8px; }
        #controls-panel button { width: 100%; padding: 8px 12px; background-color: var(--accent-color); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold; margin-bottom: 6px; transition: all 0.2s ease; }
        #controls-panel button:hover { opacity: 0.8; }
        #controls-panel .secondary-button { background-color: #3e4451; color: #abb2bf; }
        
        #message { margin-top: 10px; padding: 8px; border-radius: 4px; display: none; font-size: 0.75em; line-height: 1.3; }
        #message.success { background-color: rgba(152, 195, 121, 0.05); color: #98c379; border: 1px solid #98c379; }
        #message.error { background-color: rgba(224, 108, 117, 0.05); color: #e06c75; border: 1px solid #e06c75; }
        #message.info { background-color: rgba(97, 175, 239, 0.05); color: #61afef; border: 1px solid #61afef; }
        
        #graph-container { flex-grow: 1; background-color: var(--bg-color); position: relative; }
        #cy { width: 100%; height: 100%; display: block; }
        
        #details-panel { width: 300px; padding: 20px; border-left: 1px solid var(--border-color); background-color: var(--panel-bg); display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; overflow-y: auto; }
        #details-panel h2 { font-size: 1em; margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .detail-item { margin-bottom: 15px; }
        .detail-label { font-weight: bold; font-size: 0.7em; color: #5c6370; text-transform: uppercase; margin-bottom: 4px; }
        .detail-value { font-size: 0.9em; color: var(--text-color); overflow-wrap: break-word; }
        
        .function-list { list-style: none; padding: 0; margin-top: 8px; }
        .function-list li { padding: 5px 8px; margin-bottom: 3px; background-color: rgba(255,255,255,0.02); border-radius: 4px; font-size: 0.8em; font-family: 'Consolas', monospace; border-left: 2px solid #5c6370; }
        .function-list li.type-method { border-left-color: var(--color-method); }
        .function-list li.type-route { border-left-color: var(--color-route); }
        .function-list li.type-function { border-left-color: var(--color-route); }
        .function-list li.type-controller { border-left-color: var(--color-controller); font-weight: bold; color: var(--color-controller); }
        .function-list li.type-model { border-left-color: var(--color-model); font-weight: bold; color: var(--color-model); }
        .function-list li.type-class { border-left-color: var(--color-class); font-weight: bold; color: var(--color-class); }
        .function-list li.type-view { border-left-color: var(--color-view); color: var(--color-view); }
        .function-list li.type-folder { border-left-color: var(--color-folder); color: var(--color-folder); }
        .function-list li.type-category { border-left-color: var(--color-category); font-weight: bold; color: var(--color-category); }

        #legend { display: none; }
    </style>
</head>
<body>
    <div id="app-header">
        <h1>CI4 AST VISUALIZER</h1>
        <div class="status-bar" id="load-status"></div>
    </div>
    <div id="main-content">
        <div id="controls-panel">
            <div class="control-group">
                <label>Target Project</label>
                <input type="text" id="projectPath" placeholder="Root path...">
                <button id="generateButton">ANALYZE</button>
            </div>

            <div class="control-group">
                <label>View Presets</label>
                <button id="layoutSwimlanes" class="secondary-button" style="background-color: var(--accent-color); color: #fff;">SWIMLANES (LAYERED)</button>
                <button id="layoutDagre" class="secondary-button">ARCHITECTURE (TOP-DOWN)</button>
                <button id="layoutStar" class="secondary-button">HUB & SPOKE (CIRCLE)</button>
                <button id="layoutCose" class="secondary-button">ORGANIC (COSE)</button>
                <button id="fitGraph" class="secondary-button">CENTER VIEW</button>
            </div>

            <div id="message"></div>
        </div>
        <div id="graph-container">
            <div id="cy"></div>
        </div>
        <div id="details-panel">
            <h2>INSPECTOR</h2>
            <div id="details-content">
                <p style="color: #5c6370; font-size: 0.85em;">Select a node to inspect architecture.</p>
            </div>
        </div>
    </div>

    <script>
        let fullGraphData = null;

        document.getElementById('load-status').innerText = `SESSION: ${new Date().toLocaleTimeString()}`;

        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [],
            motionBlur: false,
            textureOnViewport: true,
            style: [
                {
                    selector: 'node[label]',
                    style: {
                        'content': 'data(label)',
                        'text-valign': 'center', 'text-halign': 'center',
                        'background-color': '#21252b',
                        'color': '#abb2bf',
                        'font-size': '9px',
                        'border-width': 1, 'border-color': '#3e4451',
                        'shape': 'roundrectangle',
                        'width': 100, 'height': 24,
                        'text-wrap': 'wrap', 'text-max-width': '90px'
                    }
                },
                {
                    selector: ':parent',
                    style: {
                        'background-opacity': 0.02,
                        'border-color': '#4b5263',
                        'border-width': 1,
                        'border-style': 'dashed',
                        'text-valign': 'top',
                        'text-margin-y': -10,
                        'padding': '15px'
                    }
                },
                { 
                    selector: 'node[type="category"]', 
                    style: { 
                        'background-opacity': 0.05, 
                        'background-color': '#e5c07b',
                        'border-color': '#e5c07b', 
                        'border-style': 'solid',
                        'border-width': 2,
                        'color': '#e5c07b',
                        'font-weight': 'bold',
                        'font-size': '11px'
                    } 
                },
                { selector: 'node[type="folder"]', style: { 'border-color': '#d19a66', 'color': '#d19a66', 'font-size': '8px' } },
                { selector: 'node[type="project"]', style: { 'background-color': '#4b5263', 'color': '#fff', 'width': 80, 'height': 24 } },
                { selector: 'node[type="controller"]', style: { 'border-color': '#61afef', 'color': '#61afef' } },
                { selector: 'node[type="model"]', style: { 'border-color': '#c678dd', 'color': '#c678dd' } },
                { selector: 'node[type="class"]', style: { 'border-color': '#e5c07b', 'color': '#e5c07b' } },
                { selector: 'node[type="view"]', style: { 'border-color': '#98c379', 'color': '#98c379', 'shape': 'rectangle' } },
                { selector: 'node[type="route"]', style: { 'border-color': '#56b6c2', 'shape': 'octagon', 'width': 70, 'height': 18, 'font-size': '7px' } },
                { selector: 'node[type="method"]', style: { 'background-color': '#2c313a', 'border-width': 0, 'width': 70, 'height': 18, 'font-size': '7px' } },
                { selector: 'node[type="function"]', style: { 'background-color': '#2c313a', 'border-width': 0, 'width': 70, 'height': 18, 'font-size': '7px' } },
                { selector: 'node[type="error"]', style: { 'background-color': '#be5046', 'border-color': '#e06c75', 'color': '#fff' } },
                {
                    selector: 'edge',
                    style: {
                        'width': 1, 'line-color': '#3e4451',
                        'target-arrow-shape': 'triangle', 'target-arrow-color': '#3e4451',
                        'curve-style': 'bezier',
                    }
                },
                {
                    selector: 'edge[label]',
                    style: { 'label': 'data(label)', 'font-size': '7px', 'color': '#5c6370', 'text-background-opacity': 1, 'text-background-color': '#1a1c22', 'text-background-padding': '1px' }
                },
            ]
        });

        cy.on('tap', 'node', function(evt){
            updateDetails(evt.target.data());
        });

        function updateDetails(data) {
            const content = document.getElementById('details-content');
            let html = `<div class="detail-item"><div class="detail-label">Name</div><div class="detail-value">${data.label}</div></div><div class="detail-item"><div class="detail-label">Type</div><div class="detail-value" style="color: var(--color-${data.type}); text-transform: uppercase; font-weight: bold; font-size: 0.8em;">${data.type}</div></div>`;

            if (fullGraphData) {
                // Find all descendants recursively
                function findAllDescendants(parentId) {
                    let direct = fullGraphData.nodes.filter(n => n.parent === parentId);
                    let all = [...direct];
                    direct.forEach(child => {
                        all = all.concat(findAllDescendants(child.id));
                    });
                    return all;
                }

                let items = findAllDescendants(data.id);
                
                // Filter for "Functional" items for the list
                const functionalItems = items.filter(n => ['method', 'function', 'route', 'controller', 'model', 'view', 'class'].includes(n.type));

                if (functionalItems.length > 0) {
                    html += `<div class="detail-item"><div class="detail-label">Contains (${functionalItems.length})</div><ul class="function-list">`;
                    functionalItems.forEach(item => { 
                        let label = item.label;
                        if (item.type === 'method') {
                            const parentCls = fullGraphData.nodes.find(n => n.id === item.parent);
                            if (parentCls) label = `${parentCls.label}::${label}`;
                        }
                        html += `<li class="type-${item.type}">${label}</li>`; 
                    });
                    html += `</ul></div>`;
                }
            }
            content.innerHTML = html;
        }
        
        const showMessage = (text, type = 'info') => {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.innerText = text;
            messageDiv.style.display = 'block';
        };

        const fetchGraphData = async () => {
            const response = await fetch('/api/graph');
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        };
        
        function renderGraph(graphData) {
            showMessage('Constructing diagram...', 'info');
            const elements = [];
            graphData.nodes.forEach(node => elements.push({ data: { id: node.id, label: node.label, type: node.type, parent: node.parent } }));
            graphData.edges.forEach(edge => elements.push({ data: { id: edge.id, source: edge.source, target: edge.target, label: edge.label } }));
            cy.add(elements);
            runLayout('swimlanes');
        }
        
        function runLayout(layoutName = 'dagre') {
            if (layoutName === 'swimlanes') {
                runSwimlaneLayout();
                return;
            }

            let layoutOptions = { name: layoutName, animate: false, padding: 30, fit: true };
            if (layoutName === 'dagre') { 
                layoutOptions.rankDir = 'TB'; 
                layoutOptions.nodeSep = 40; 
                layoutOptions.rankSep = 80; 
            }
            else if (layoutName === 'concentric') { layoutOptions.minNodeSpacing = 60; }
            else if (layoutName === 'breadthfirst') { layoutOptions.directed = true; layoutOptions.spacingFactor = 1.5; }
            
            let layout = cy.layout(layoutOptions);
            layout.on('layoutstop', () => showMessage('Rendering complete.', 'success'));
            layout.run();
        }

        function runSwimlaneLayout() {
            showMessage('Aligning layers...', 'info');
            const categories = cy.nodes('[type="category"]');
            const projectNode = cy.nodes('[type="project"]');
            const order = ['🕹️ CONTROLLERS', '📦 MODELS', '🖼️ VIEWS', '⚙️ CONFIG'];
            const columnWidth = 600;
            const startX = 0;

            projectNode.position({ x: (order.length * columnWidth) / 2, y: -200 });

            categories.forEach(cat => {
                const label = cat.data('label');
                const colIndex = order.indexOf(label);
                const xPos = colIndex >= 0 ? startX + (colIndex * columnWidth) : startX + (order.length * columnWidth);
                cat.position({ x: xPos, y: 0 });
                const children = cat.descendants();
                if (children.length > 0) {
                    children.layout({
                        name: 'dagre',
                        rankDir: 'TB',
                        nodeSep: 30,
                        rankSep: 60,
                        boundingBox: { 
                            x1: xPos - (columnWidth/2) + 50, 
                            y1: 100, 
                            x2: xPos + (columnWidth/2) - 50, 
                            y2: 5000 
                        }
                    }).run();
                }
            });
            cy.fit(null, 50);
            showMessage('Swimlane view ready.', 'success');
        }

        async function initData() {
            try {
                const graphData = await fetchGraphData();
                if (graphData.nodes && graphData.nodes.length > 0) {
                    fullGraphData = graphData;
                    renderGraph(graphData);
                }
            } catch (e) {}
        }
        
        document.getElementById('generateButton').addEventListener('click', async () => {
            const projectPath = document.getElementById('projectPath').value;
            if (!projectPath) { showMessage('Please enter path.', 'error'); return; }
            try {
                cy.elements().remove();
                fullGraphData = null;
                showMessage('Analyzing AST...', 'info');
                await fetch('/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: projectPath }) });
                let attempts = 0;
                const poll = setInterval(async () => {
                    attempts++;
                    try {
                        const graphData = await fetchGraphData();
                        if (graphData.nodes && (graphData.nodes.length > 2 || attempts >= 40)) {
                            clearInterval(poll);
                            fullGraphData = graphData;
                            renderGraph(graphData);
                        }
                    } catch (e) { clearInterval(poll); showMessage(`Error: ${e.message}`, 'error'); }
                }, 2000);
            } catch (error) { showMessage(`Error: ${error.message}`, 'error'); }
        });

        document.getElementById('layoutSwimlanes').addEventListener('click', () => runLayout('swimlanes'));
        document.getElementById('layoutDagre').addEventListener('click', () => runLayout('dagre'));
        document.getElementById('layoutStar').addEventListener('click', () => runLayout('concentric'));
        document.getElementById('layoutCose').addEventListener('click', () => runLayout('cose'));
        document.getElementById('fitGraph').addEventListener('click', () => cy.fit(null, 30));

        initData();
    </script>
</body>
</html>
