<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code AST Visualizer</title>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre/cytoscape-dagre.js"></script>
    <style>
        :root {
            --bg-color: #282c34;
            --panel-bg: #323842;
            --text-color: #abb2bf;
            --header-color: #abb2bf;
            --border-color: #4b5263;
            --accent-color: #61afef;
            --node-bg: #3a404c;
            --node-label: #dcdfe4;
        }

        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); color: var(--text-color); }
        #app-header { background-color: var(--panel-bg); color: var(--header-color); padding: 10px 20px; box-shadow: 0 2px 4px rgba(0,0,0,.1); display: flex; justify-content: space-between; align-items: center; z-index: 20; border-bottom: 1px solid var(--border-color); }
        #app-header h1 { margin: 0; font-size: 1.3em; }
        #app-header .status-bar { font-size: 0.8em; color: #888; }
        
        #main-content { display: flex; flex-grow: 1; overflow: hidden; }
        #controls-panel { width: 280px; padding: 20px; border-right: 1px solid var(--border-color); background-color: var(--panel-bg); box-shadow: 2px 0 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        #controls-panel .control-group { margin-bottom: 20px; }
        #controls-panel label { display: block; margin-bottom: 8px; font-weight: bold; }
        #controls-panel input[type="text"] { width: calc(100% - 22px); padding: 10px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; font-size: 0.9em; color: var(--text-color); }
        #controls-panel button { width: 100%; padding: 10px 15px; background-color: var(--accent-color); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; margin-bottom: 10px; transition: background-color 0.2s ease; }
        #controls-panel button:hover { background-color: #529bda; }
        #controls-panel .secondary-button { background-color: #4b5263; }
        #controls-panel .secondary-button:hover { background-color: #5a6268; }
        
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-size: 0.8em; overflow-wrap: break-word; }
        #message.success { background-color: #2c5a3a; color: #9ae6b4; border: 1px solid #38a169; }
        #message.error { background-color: #6a2a2a; color: #feb2b2; border: 1px solid #e53e3e; }
        #message.info { background-color: #2b5f6a; color: #a0deeb; border: 1px solid #319795; }
        
        #graph-container { flex-grow: 1; background-color: var(--bg-color); position: relative; }
        #cy { width: 100%; height: 100%; display: block; }
        
        #details-panel { width: 320px; padding: 20px; border-left: 1px solid var(--border-color); background-color: var(--panel-bg); box-shadow: -2px 0 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; overflow-y: auto; }
        #details-panel h2 { font-size: 1.2em; margin-top: 0; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px; }
        .detail-item { margin-bottom: 15px; }
        .detail-label { font-weight: bold; font-size: 0.8em; color: #888; text-transform: uppercase; }
        .detail-value { font-size: 1em; margin-top: 3px; overflow-wrap: break-word; }
        .function-list { list-style: none; padding: 0; margin-top: 10px; }
        .function-list li { padding: 5px 8px; margin-bottom: 3px; background-color: var(--bg-color); border-radius: 3px; font-size: 0.9em; font-family: monospace; border-left: 3px solid #6c757d; }

        #legend { display: none; }
    </style>
</head>
<body>
    <div id="app-header">
        <h1>Code AST Visualizer</h1>
        <div class="status-bar" id="load-status"></div>
    </div>
    <div id="main-content">
        <div id="controls-panel">
            <div class="control-group">
                <label for="projectPath">Project Path:</label>
                <input type="text" id="projectPath" placeholder="e.g., C:\xampp\htdocs\my_project">
                <button id="generateButton">Generate Diagram</button>
            </div>

            <div class="control-group">
                <label>Layout Controls:</label>
                <button id="layoutDagre" class="secondary-button">Run Dagre Layout</button>
                <button id="layoutCose" class="secondary-button">Run Cose Layout</button>
                <button id="fitGraph" class="secondary-button">Fit to Screen</button>
            </div>

            <div id="message"></div>
        </div>
        <div id="graph-container">
            <div id="cy"></div>
        </div>
        <div id="details-panel">
            <h2>Node Details</h2>
            <div id="details-content">
                <p style="color: #888;">Select a node in the graph to see its functions and properties.</p>
            </div>
        </div>
    </div>

    <script>
        let fullGraphData = null;

        document.getElementById('load-status').innerText = `Loaded: ${new Date().toLocaleTimeString()}`;

        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [],
            motionBlur: false,
            textureOnViewport: true,
            style: [
                {
                    selector: 'node[label]',
                    style: {
                        'content': 'data(label)',
                        'text-valign': 'center', 'text-halign': 'center',
                        'background-color': '#3a404c',
                        'color': '#dcdfe4',
                        'font-size': '10px', 'font-weight': 'bold',
                        'border-width': 1, 'border-color': '#4b5263',
                        'shape': 'roundrectangle',
                        'text-wrap': 'wrap',
                        'text-max-width': '80px'
                    }
                },
                {
                    selector: ':parent',
                    style: {
                        'background-opacity': 0.1,
                        'border-color': '#888',
                        'border-style': 'dashed',
                        'text-valign': 'top',
                        'padding': '10px', // Reduced padding
                        'width': 'auto', 'height': 'auto' // Let Cytoscape calculate parent size
                    }
                },
                { selector: 'node[type="project"]', style: { 'background-color': '#4b5263', 'color': 'white', 'font-size': '12px', 'border-width': 0, 'width': 100, 'height': 30 } },
                { selector: 'node[type="file"]', style: { 'border-color': '#4b5263', 'background-opacity': 0.05 } },
                { selector: 'node[type="controller"]', style: { 'border-color': '#56b6c2', 'background-opacity': 0.05 } },
                { selector: 'node[type="model"]', style: { 'border-color': '#c678dd', 'background-opacity': 0.05 } },
                { selector: 'node[type="route"]', style: { 'border-color': '#e5c07b', 'shape': 'octagon', 'width': 80, 'height': 20, 'font-size': '8px' } },
                { selector: 'node[type="method"]', style: { 'background-color': '#4b5263', 'border-width': 0, 'width': 80, 'height': 20, 'font-size': '8px' } },
                { selector: 'node[type="function"]', style: { 'background-color': '#4b5263', 'border-width': 0, 'width': 80, 'height': 20, 'font-size': '8px' } },
                { selector: 'node[type="view"]', style: { 'border-color': '#e06c75', 'width': 60, 'height': 20, 'font-size': '8px' } },
                { selector: 'node[type="base_class"]', style: { 'background-color': '#e9ecef', 'border-color': '#adb5bd', 'shape': 'diamond', 'color': '#333' } },
                { selector: 'node[type="model_instance"]', style: { 'background-color': '#ffeeba', 'border-color': '#ffc107', 'shape': 'pentagon', 'color': '#333' } },
                { selector: 'node[type="error"]', style: { 'background-color': '#be5046', 'border-color': '#e06c75', 'color': 'white' } },
                {
                    selector: 'edge',
                    style: {
                        'width': 1,
                        'line-color': '#4b5263',
                        'target-arrow-shape': 'triangle', 'target-arrow-color': '#4b5263',
                        'curve-style': 'straight',
                    }
                },
                {
                    selector: 'edge[label]',
                    style: { 'label': 'data(label)', 'font-size': '8px', 'color': '#888', 'text-background-opacity': 1, 'text-background-color': '#282c34', 'text-background-padding': '2px' }
                },
            ]
        });

        cy.on('tap', 'node', function(evt){
            updateDetails(evt.target.data());
        });

        function updateDetails(data) {
            const content = document.getElementById('details-content');
            let html = `<div class="detail-item"><div class="detail-label">Name</div><div class="detail-value">${data.label}</div></div><div class="detail-item"><div class="detail-label">Type</div><div class="detail-value" style="text-transform: capitalize;">${data.type}</div></div>`;

            if (fullGraphData) {
                let items = [];
                if (data.type === 'file') {
                    const directChildren = fullGraphData.nodes.filter(n => n.parent === data.id);
                    items = [...directChildren];
                    const classes = directChildren.filter(n => n.type === 'controller' || n.type === 'model' || n.type === 'class');
                    classes.forEach(cls => {
                        const methods = fullGraphData.nodes.filter(n => n.parent === cls.id);
                        methods.forEach(m => {
                            if (!items.find(item => item.id === m.id)) {
                                items.push({...m, label: `${cls.label}::${m.label}`});
                            }
                        });
                    });
                } else {
                    items = fullGraphData.nodes.filter(n => n.parent === data.id);
                }

                if (items.length > 0) {
                    html += `<div class="detail-item"><div class="detail-label">Contains (${items.length})</div><ul class="function-list">`;
                    items.forEach(item => { html += `<li class="type-${item.type}">${item.label}</li>`; });
                    html += `</ul></div>`;
                }
            }
            content.innerHTML = html;
        }
        
        const showMessage = (text, type = 'info') => {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.innerText = text;
            messageDiv.style.display = 'block';
        };

        const fetchGraphData = async () => {
            const response = await fetch('/api/graph');
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        };
        
        function renderGraph(graphData) {
            showMessage('Rendering graph...', 'info');
            const elements = [];
            graphData.nodes.forEach(node => elements.push({ data: { id: node.id, label: node.label, type: node.type, parent: node.parent } }));
            graphData.edges.forEach(edge => elements.push({ data: { id: edge.id, source: edge.source, target: edge.target, label: edge.label } }));
            
            cy.add(elements);
            runLayout('dagre');
        }
        
        function runLayout(layoutName = 'dagre') {
            let layout = cy.layout({
                name: layoutName,
                animate: false,
                padding: 20, // Reduced padding
                fit: true,
                rankDir: 'TB', // Top-down for dagre
                nodeSep: 20, // Tighter packing
                rankSep: 40
            });

            layout.on('layoutstop', function(){
                showMessage('Graph rendered successfully!', 'success');
            });
            
            layout.run();
        }

        async function initData() {
            try {
                const graphData = await fetchGraphData();
                if (graphData.nodes && graphData.nodes.length > 0) {
                    fullGraphData = graphData;
                    renderGraph(graphData);
                }
            } catch (e) { console.error("Auto-fetch failed:", e); }
        }
        
        document.getElementById('generateButton').addEventListener('click', async () => {
            const projectPath = document.getElementById('projectPath').value;
            if (!projectPath) { showMessage('Please enter a project path.', 'error'); return; }

            try {
                cy.elements().remove();
                fullGraphData = null;
                showMessage('Analyzing project...', 'info');

                await fetch('/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: projectPath }) });
                
                let attempts = 0;
                const poll = setInterval(async () => {
                    attempts++;
                    try {
                        const graphData = await fetchGraphData();
                        if (graphData.nodes && (graphData.nodes.length > 2 || attempts >= 30)) {
                            clearInterval(poll);
                            fullGraphData = graphData;
                            renderGraph(graphData);
                        }
                    } catch (e) {
                        clearInterval(poll);
                        showMessage(`Error: ${e.message}`, 'error');
                    }
                }, 2000);

            } catch (error) {
                showMessage(`Error: ${error.message}`, 'error');
            }
        });

        document.getElementById('layoutDagre').addEventListener('click', () => runLayout('dagre'));
        document.getElementById('layoutCose').addEventListener('click', () => runLayout('cose'));
        document.getElementById('fitGraph').addEventListener('click', () => cy.fit(null, 30));

        initData();
    </script>
</body>
</html>
